<div class="d-flex flex-column gap-3">
  <p class="text-muted mb-0 small">
    {{
      mode() === 'new' ? 'Preencha os dados do novo parâmetro.' : 'Atualize os dados do parâmetro.'
    }}
  </p>

  <!-- Nome -->
  <div>
    <label for="nome" class="form-label">Nome</label>
    <input
      id="nome"
      name="nome"
      type="text"
      class="form-control"
      [(ngModel)]="nome"
      placeholder="Informe o nome do parâmetro"
    />
  </div>

  <!-- Descrição -->
  <div>
    <label for="descricao" class="form-label">Descrição</label>
    <textarea
      id="descricao"
      name="descricao"
      class="form-control"
      rows="2"
      [(ngModel)]="descricao"
      placeholder="Descrição do parâmetro (opcional)"
    ></textarea>
  </div>

  <!-- Categoria -->
  <div>
    <label for="categoryId" class="form-label">Categoria</label>
    <select
      id="categoryId"
      name="categoryId"
      class="form-select"
      [value]="categoryId()"
      (change)="categoryId.set(+$any($event.target).value)"
    >
      <option [value]="0">Selecione uma categoria</option>
      @for (cat of categories(); track cat.id) {
        <option [value]="+cat.id">{{ cat.nome }}</option>
      }
    </select>
  </div>

  <!-- Grupo -->
  <div>
    <label for="groupId" class="form-label">Grupo</label>

    @if (!criandoGrupo()) {
      <div class="d-flex gap-2">
        <select
          id="groupId"
          name="groupId"
          class="form-select"
          [value]="groupId()"
          (change)="groupId.set($any($event.target).value)"
        >
          <option value="">Sem grupo</option>
          @for (g of groups(); track g.id) {
            <option [value]="g.id">{{ g.nome }}</option>
          }
        </select>
        <button type="button" class="btn btn-outline-secondary" (click)="abrirNovoGrupo()">
          <i class="bi bi-plus-lg"></i> Novo
        </button>
      </div>
    } @else {
      <div class="d-flex gap-2">
        <input
          type="text"
          class="form-control"
          placeholder="Nome do novo grupo"
          [value]="novoGrupoNome()"
          (input)="novoGrupoNome.set($any($event.target).value)"
        />
        <button type="button" class="btn btn-outline-secondary" (click)="cancelarNovoGrupo()">
          Cancelar
        </button>
      </div>
      <div class="form-text">O grupo será criado ao salvar.</div>
    }
  </div>

  <!-- Status -->
  <div>
    <label class="form-label">Status</label>
    <div class="form-check form-switch">
      <input
        id="status"
        name="status"
        type="checkbox"
        class="form-check-input"
        [(ngModel)]="status"
      />
      <label class="form-check-label" for="status">
        {{ status ? 'Ativo' : 'Inativo' }}
      </label>
    </div>
  </div>

  <!-- Limites -->
  <div class="card border-0 bg-light">
    <div class="card-body py-2 px-3">
      <div class="small text-muted mb-2">
        <i class="bi bi-sliders me-1"></i>Limite de inspeção (opcional)
      </div>
      <div class="row g-2">
        <div class="col-6">
          <label for="limitMin" class="form-label small">Mínimo</label>
          <input
            id="limitMin"
            name="limitMin"
            type="number"
            class="form-control form-control-sm"
            [value]="limitMin()"
            (input)="limitMin.set($any($event.target).value)"
            placeholder="Ex: 0"
          />
        </div>
        <div class="col-6">
          <label for="limitMax" class="form-label small">Máximo</label>
          <input
            id="limitMax"
            name="limitMax"
            type="number"
            class="form-control form-control-sm"
            [value]="limitMax()"
            (input)="limitMax.set($any($event.target).value)"
            placeholder="Ex: 100"
          />
        </div>
      </div>
    </div>
  </div>
</div>
