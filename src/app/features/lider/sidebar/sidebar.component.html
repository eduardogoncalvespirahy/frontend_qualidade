<!-- BOTÃO MOBILE -->

<button class="btn btn-primary d-lg-none m-2" (click)="toggleMobile()">☰</button>

<!-- BACKDROP MOBILE -->

@if (mobileOpen()) {
  <div class="sidebar-backdrop" (click)="toggleMobile()"></div>
}

<!-- SIDEBAR -->

<aside class="sidebar" [class.collapsed]="collapsed()" [class.mobile-open]="mobileOpen()">
  <!-- HEADER -->

  <div class="sidebar-header">
    @if (!collapsed()) {
      <h5 class="mb-0 fw-bold">Quality App</h5>
    }

    <button class="btn btn-sm btn-outline-light" (click)="toggleSidebar()">
      @if (collapsed()) {
        <span>›</span>
      } @else {
        <span>‹</span>
      }
    </button>
  </div>

  <!-- MENU -->

  <nav class="sidebar-menu">
    <a routerLink="/home" routerLinkActive="active" class="menu-item">
      <i class="bi bi-house"></i>

      @if (!collapsed()) {
        <span>Home</span>
      }
    </a>

    <a routerLink="/inspection-panel" routerLinkActive="active" class="menu-item">
      <i class="bi bi-clipboard-check"></i>

      @if (!collapsed()) {
        <span>Painel de Inspeção</span>
      }
    </a>

    <a routerLink="/history" routerLinkActive="active" class="menu-item">
      <i class="bi bi-clock-history"></i>

      @if (!collapsed()) {
        <span>Histórico de Envios</span>
      }
    </a>

    <!-- CONFIGURAÇÕES -->

    <div class="menu-group">
      <button class="menu-item menu-button" (click)="toggleConfig()">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-gear"></i>

          @if (!collapsed()) {
            <span>Configurações</span>
          }
        </div>

        @if (!collapsed()) {
          <i
            class="bi"
            [class.bi-chevron-down]="!configOpen()"
            [class.bi-chevron-up]="configOpen()"
          >
          </i>
        }
      </button>

      @if (configOpen() && !collapsed()) {
        <div class="submenu">
          <a routerLink="/settings/equipments" routerLinkActive="active" class="submenu-item">
            Gestão de Equipamentos
          </a>

          <a routerLink="/settings/rules" routerLinkActive="active" class="submenu-item">
            Regras e Parâmetros
          </a>

          <a routerLink="/settings/forms" routerLinkActive="active" class="submenu-item">
            Formulários Base
          </a>

          <a routerLink="/settings/users" routerLinkActive="active" class="submenu-item">
            Gerenciar Usuários
          </a>
        </div>
      }
    </div>
  </nav>

  <!-- LOGOUT -->

  <div class="sidebar-footer">
    <button class="btn btn-danger w-100" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i>

      @if (!collapsed()) {
        <span class="ms-2"> Sair </span>
      }
    </button>
  </div>
</aside>
