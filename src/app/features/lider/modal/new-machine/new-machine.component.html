@if (error()) {
  <div class="alert alert-danger py-2 small">{{ error() }}</div>
}

<div class="mb-3">
  <label class="form-label fw-medium">Local <span class="text-danger">*</span></label>
  <select
    class="form-select"
    [value]="selectedLocationId()"
    (change)="onLocationChange($any($event.target).value)"
  >
    <option value="">Selecione um local</option>
    @for (loc of locations; track loc.id) {
      <option [value]="loc.id">{{ loc.nome }}</option>
    }
  </select>
</div>

<div class="mb-3">
  <label class="form-label fw-medium">Seção <span class="text-danger">*</span></label>
  <select
    class="form-select"
    [value]="selectedSectionId()"
    (change)="onSectionChange($any($event.target).value)"
    [disabled]="!selectedLocationId()"
  >
    <option value="">Selecione uma seção</option>
    @for (sec of filteredSections(); track sec.id) {
      <option [value]="sec.id">{{ sec.nome }}</option>
    }
  </select>
</div>

<div class="mb-3">
  <label class="form-label fw-medium">Formulário <span class="text-danger">*</span></label>
  <select
    class="form-select"
    [value]="selectedFormId()"
    (change)="selectedFormId.set($any($event.target).value)"
    [disabled]="!selectedSectionId()"
  >
    <option value="">Selecione um formulário</option>
    @for (f of filteredForms(); track f.id) {
      <option [value]="f.id">{{ f.nome }}</option>
    }
  </select>
</div>

<div class="mb-3">
  <label class="form-label fw-medium">Nome <span class="text-danger">*</span></label>
  <input
    type="text"
    class="form-control"
    [value]="nome()"
    (input)="nome.set($any($event.target).value)"
    placeholder="Nome da máquina"
  />
</div>

<div class="mb-4">
  <label class="form-label fw-medium">Descrição</label>
  <textarea
    class="form-control"
    rows="2"
    [value]="descricao()"
    (input)="descricao.set($any($event.target).value)"
    placeholder="Descrição opcional"
  ></textarea>
</div>

<div class="d-flex justify-content-end gap-2">
  <button class="btn btn-outline-secondary" (click)="cancel()" [disabled]="loading()">
    Cancelar
  </button>
  <button class="btn btn-primary" (click)="save()" [disabled]="loading()">
    @if (loading()) {
      <span class="spinner-border spinner-border-sm me-1"></span>
    }
    Adicionar
  </button>
</div>
