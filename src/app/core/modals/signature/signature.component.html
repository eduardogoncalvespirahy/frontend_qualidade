<div #wrapper class="signature-wrapper">

  <!-- Toolbar -->
  <div class="signature-toolbar">

    <div class="d-flex align-items-center gap-2">

      <i class="bi bi-pen-fill text-primary"></i>

      <div>
        <div class="fw-semibold">
          Assinatura
        </div>

        <small class="text-muted">
          Utilize o mouse, dedo ou caneta para assinar
        </small>
      </div>

    </div>

    <div class="d-flex align-items-center gap-2">

      <!-- Tela cheia -->

      <button type="button" class="btn btn-outline-secondary btn-sm" (click)="toggleFullscreen()">

        <i class="bi" [class.bi-arrows-fullscreen]="!fullscreen()" [class.bi-fullscreen-exit]="fullscreen()">
        </i>

        {{ fullscreen() ? 'Recolher' : 'Tela cheia' }}

      </button>

      <!-- Limpar -->

      <button type="button" class="btn btn-outline-danger btn-sm" (click)="clear()" [disabled]="isEmpty()">

        <i class="bi bi-eraser me-1"></i>

        Limpar

      </button>

    </div>

  </div>

  <!-- Área da assinatura -->

  <div #signatureBody class="signature-body">

    <canvas #canvas class="signature-canvas" (pointerdown)="start($event)" (pointermove)="draw($event)"
      (pointerup)="stop()" (pointerleave)="stop()" (pointercancel)="stop()">

    </canvas>

    <!-- Placeholder -->

    @if (isEmpty()) {

    <div class="signature-placeholder">

      <i class="bi bi-vector-pen display-5 text-secondary opacity-25">
      </i>

      <div class="fw-semibold text-secondary mt-2">
        Assine nesta área
      </div>

      <small class="text-muted">

        Mouse • Toque • Caneta Digital

      </small>

    </div>

    }

  </div>

  <!-- Rodapé -->

  <div class="signature-footer">

    <small class="text-muted">

      <i class="bi bi-info-circle me-1"></i>

      Sua assinatura será salva em formato PNG.

    </small>

  </div>

</div>
