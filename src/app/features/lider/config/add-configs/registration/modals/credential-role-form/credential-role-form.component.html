<div class="mb-3">
  <label class="form-label fw-semibold">Buscar regra</label>
  <input
    type="text"
    class="form-control"
    placeholder="Digite o nome da regra…"
    autocomplete="off"
    [ngModel]="query()"
    (ngModelChange)="query.set($event)"
  />
</div>

@if (filtered().length) {
  <div class="list-group cred-role__list">
    @for (role of filtered(); track role.id) {
      <label class="list-group-item d-flex align-items-center gap-2">
        <input
          class="form-check-input m-0"
          type="checkbox"
          [checked]="isSelected(role.id)"
          (change)="toggle(role.id)"
        />
        <span>{{ role.nome }}</span>
      </label>
    }
  </div>
} @else {
  <p class="text-muted mb-0">Nenhuma regra disponível para adicionar.</p>
}

<div class="form-text mt-2">{{ selectedIds().length }} regra(s) selecionada(s).</div>
