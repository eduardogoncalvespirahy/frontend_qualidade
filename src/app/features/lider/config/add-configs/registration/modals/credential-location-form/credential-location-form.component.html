<div class="mb-3">
  <label class="form-label fw-semibold">Buscar local</label>
  <input
    type="text"
    class="form-control"
    placeholder="Digite o nome do local…"
    autocomplete="off"
    [ngModel]="query()"
    (ngModelChange)="query.set($event)"
  />
</div>

@if (filtered().length) {
  <div class="list-group cred-loc__list">
    @for (loc of filtered(); track loc.id) {
      <label class="list-group-item d-flex align-items-center gap-2">
        <input
          class="form-check-input m-0"
          type="checkbox"
          [checked]="isSelected(loc.id)"
          (change)="toggle(loc.id)"
        />
        <span>{{ loc.nome }}</span>
      </label>
    }
  </div>
} @else {
  <p class="text-muted mb-0">Nenhum local disponível para adicionar.</p>
}

<div class="form-text mt-2">{{ selectedIds().length }} local(is) selecionado(s).</div>
