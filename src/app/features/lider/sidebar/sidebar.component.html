<!-- BOTÃO MOBILE -->

<button class="btn btn-primary d-lg-none m-2" (click)="toggleMobile()">☰</button>

<!-- BACKDROP MOBILE -->

@if (mobileOpen()) {
  <div class="sidebar-backdrop" (click)="toggleMobile()"></div>
}

<!-- SIDEBAR -->

<aside class="sidebar" [class.collapsed]="collapsed()" [class.mobile-open]="mobileOpen()">
  <!-- HEADER -->

  <div class="sidebar-header">
    @if (!collapsed()) {
      <h5 class="mb-0 fw-bold">Quality App</h5>
    }

    <button class="btn btn-sm btn-outline-light" (click)="toggleSidebar()">
      @if (collapsed()) {
        <span>›</span>
      } @else {
        <span>‹</span>
      }
    </button>
  </div>

  <!-- MENU -->

  <nav class="sidebar-menu">
    <a routerLink="/home" routerLinkActive="active" class="menu-item">
      <i class="bi bi-house"></i>

      @if (!collapsed()) {
        <span>Home</span>
      }
    </a>

    <a routerLink="/lider/painel" routerLinkActive="active" class="menu-item">
      <i class="bi bi-clipboard-check"></i>

      @if (!collapsed()) {
        <span>Painel de Inspeção</span>
      }
    </a>

    <a routerLink="/history" routerLinkActive="active" class="menu-item">
      <i class="bi bi-clock-history"></i>

      @if (!collapsed()) {
        <span>Histórico de Envios</span>
      }
    </a>

    <!-- CONFIGURAÇÕES -->

    <a routerLink="/lider/config" routerLinkActive="active" class="menu-item">
      <i class="bi bi-gear"></i>

      @if (!collapsed()) {
        <span>Configurações</span>
      }
    </a>
  </nav>

  <!-- LOGOUT -->

  <div class="sidebar-footer">
    <button class="btn btn-danger w-100" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i>

      @if (!collapsed()) {
        <span class="ms-2"> Sair </span>
      }
    </button>
  </div>
</aside>
