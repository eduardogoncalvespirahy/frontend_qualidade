<div class="d-flex flex-column gap-3">
  <p class="text-muted mb-0 small">Selecione a regra a vincular a esta credencial.</p>

  @if (roles().length) {
    <div>
      <label for="roleId" class="form-label">Regra</label>
      <select id="roleId" name="roleId" class="form-select" [(ngModel)]="roleId">
        <option value="">Selecione uma regra</option>
        @for (r of roles(); track r.id) {
          <option [value]="r.id">{{ r.nome }}</option>
        }
      </select>
    </div>
  } @else {
    <div class="alert alert-warning mb-0 py-2 small">
      Nenhuma regra disponível para o sistema desta credencial.
    </div>
  }
</div>
