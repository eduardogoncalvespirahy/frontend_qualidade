<div class="d-flex flex-column gap-3">

  <div class="d-flex align-items-center gap-2 small text-muted">
    <i class="bi bi-list-check"></i>
    Parâmetros de <strong class="text-dark ms-1">{{ formNome() }}</strong>
    <span class="ms-auto badge text-bg-secondary fw-normal">{{ answers().length }}</span>
  </div>

  @if (answers().length === 0) {
    <div class="text-center py-5 text-muted border rounded-3 bg-light">
      <i class="bi bi-inbox fs-2 d-block mb-2 opacity-50"></i>
      <div class="small">Nenhum parâmetro cadastrado.</div>
    </div>
  } @else {
    <div class="d-flex flex-column gap-1">
      @for (a of answers(); track a.id) {
        <button
          type="button"
          class="d-flex align-items-center gap-3 border rounded-3 px-3 py-2 text-start w-100 bg-white"
          style="cursor:pointer; transition:background .15s"
          (click)="selecionar(a)"
        >
          <span class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                style="width:2rem;height:2rem;background:#e0e7ff">
            <i class="bi bi-sliders2 text-primary" style="font-size:.8rem"></i>
          </span>

          <div class="flex-fill overflow-hidden">
            <div class="fw-semibold small">{{ a.nome }}</div>
            @if (a.descricao) {
              <div class="text-muted text-truncate" style="font-size:.75rem">{{ a.descricao }}</div>
            }
          </div>

          @if (hasLimit(a.id)) {
            <span class="badge text-bg-success fw-normal">
              <i class="bi bi-check-lg me-1"></i>Limite
            </span>
          } @else {
            <span class="badge text-bg-light border text-muted fw-normal">Sem limite</span>
          }

          <span
            class="badge fw-normal"
            [class.text-bg-success]="a.status === 1"
            [class.text-bg-secondary]="a.status !== 1"
          >
            {{ a.status === 1 ? 'Ativo' : 'Inativo' }}
          </span>

          <i class="bi bi-chevron-right text-muted" style="font-size:.75rem"></i>
        </button>
      }
    </div>
  }

</div>
