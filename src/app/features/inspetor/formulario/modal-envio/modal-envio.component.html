<div class="d-flex flex-column gap-3">

  <!-- Hierarquia: Local → Seção → Formulário -->
  <div class="d-flex gap-1 align-items-center small text-muted">
    <span>{{ locationNome() }}</span>
    <i class="bi bi-chevron-right"></i>
    <span>{{ sectionNome() }}</span>
    <i class="bi bi-chevron-right"></i>
    <strong class="text-dark">{{ formNome() }}</strong>
  </div>

  <!-- Resumo das respostas agrupadas por categoria -->
  <div>
    @for (grupo of agrupados(); track $index) {
      <p class="fw-semibold mb-1 mt-2">{{ grupo.categoria?.nome ?? 'Sem categoria' }}</p>
      @for (answer of grupo.answers; track answer.id) {
        <div class="d-flex justify-content-between border-bottom py-1 small">
          <span class="text-muted">{{ answer.nome }}</span>
          <span class="fw-medium">{{ respostas()[answer.id] || '—' }}</span>
        </div>
      }
    }
  </div>

  <!-- Matrícula -->
  <div>
    <label class="form-label small">Matrícula</label>
    <input
      type="text"
      class="form-control"
      placeholder="Informe sua matrícula"
      [value]="matricula()"
      (input)="matricula.set($any($event.target).value)"
    />
  </div>

  <!-- Observação -->
  <div>
    <label class="form-label small">Observação (opcional)</label>
    <textarea
      class="form-control"
      rows="2"
      placeholder="Alguma observação sobre esta inspeção..."
      [value]="observacao()"
      (input)="observacao.set($any($event.target).value)"
    ></textarea>
  </div>

  <!-- Assinatura digital -->
  <div>
    <label class="form-label small">Assinatura</label>
    <canvas
      #canvas
      width="400"
      height="150"
      class="border rounded w-100"
      style="touch-action: none; cursor: crosshair;"
      (mousedown)="iniciarDesenho($event)"
      (mousemove)="desenhar($event)"
      (mouseup)="pararDesenho()"
      (mouseleave)="pararDesenho()"
      (touchstart)="iniciarDesenho($event)"
      (touchmove)="desenhar($event)"
      (touchend)="pararDesenho()"
    ></canvas>
    <button class="btn btn-sm btn-outline-secondary mt-1" type="button" (click)="limpar()">
      <i class="bi bi-eraser me-1"></i>Limpar assinatura
    </button>
  </div>

</div>
