<div class="mb-3 text-muted small">
  @if (section) {
    <i class="bi bi-diagram-3 me-1"></i>{{ section.nome }}
  }
  @if (section && form) { · }
  @if (form) {
    <i class="bi bi-file-earmark-text me-1"></i>{{ form.nome }}
  }
</div>

@if (error()) {
  <div class="alert alert-danger py-2 small">{{ error() }}</div>
}

<div class="mb-3">
  <label class="form-label fw-medium">Nome <span class="text-danger">*</span></label>
  <input
    type="text"
    class="form-control"
    [value]="nome()"
    (input)="nome.set($any($event.target).value)"
    placeholder="Nome da máquina"
  />
</div>

<div class="mb-3">
  <label class="form-label fw-medium">Descrição</label>
  <textarea
    class="form-control"
    rows="2"
    [value]="descricao()"
    (input)="descricao.set($any($event.target).value)"
    placeholder="Descrição opcional"
  ></textarea>
</div>

<div class="mb-4">
  <label class="form-label fw-medium">Status</label>
  <select class="form-select" [value]="status()" (change)="status.set(+$any($event.target).value)">
    <option [value]="1">Ativo</option>
    <option [value]="0">Inativo</option>
  </select>
</div>

<div class="d-flex justify-content-between gap-2">
  <button
    class="btn btn-sm"
    [class.btn-outline-danger]="!confirming()"
    [class.btn-danger]="confirming()"
    (click)="remove()"
    [disabled]="loading()"
  >
    <i class="bi bi-trash me-1"></i>
    {{ confirming() ? 'Confirmar remoção' : 'Remover' }}
  </button>

  <div class="d-flex gap-2">
    <button class="btn btn-outline-secondary" (click)="cancel()" [disabled]="loading()">
      Cancelar
    </button>
    <button class="btn btn-primary" (click)="save()" [disabled]="loading()">
      @if (loading()) {
        <span class="spinner-border spinner-border-sm me-1"></span>
      }
      Salvar
    </button>
  </div>
</div>
